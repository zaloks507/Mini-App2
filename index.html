<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<title>Cyber Ap</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: black;
  color: cyan;
  overflow: hidden;
}

canvas {
  position: fixed;
  top: 0;
  left: 0;
  z-index: -1;
}

.container {
  text-align: center;
  margin-top: 40px;
}

.profile img {
  width: 120px;
  border-radius: 50%;
  box-shadow: 0 0 20px cyan;
}

button {
  padding: 10px 20px;
  background: black;
  border: 2px solid cyan;
  color: cyan;
  cursor: pointer;
  margin: 10px;
  transition: 0.3s;
}

button:hover {
  background: cyan;
  color: black;
}
</style>
</head>

<body>

<canvas id="stars"></canvas>

<div class="container">
  <h1>👾 CYBER PROFILE</h1>

  <div class="profile">
    <img id="avatar">
    <h2 id="name"></h2>
    <p id="username"></p>
    <p id="id"></p>
  </div>

  <button onclick="showInfo()">Инфо</button>
  <button onclick="playMusic()">▶ Музыка</button>
</div>

<!-- 🎧 Музыка -->
<audio id="bgMusic" loop>
  <source src="https://open.spotify.com/track/0UZ5AmgbIWJPWDAaXXjb75?si=e220b86865bc43d7" type="audio/mpeg">
</audio>

<script>
const tg = window.Telegram.WebApp;
tg.expand();

// 👤 Пользователь
const user = tg.initDataUnsafe.user || {
  first_name: "Guest",
  username: "unknown",
  id: "0000"
};

document.getElementById("name").innerText =
  user.first_name + " " + (user.last_name || "");

document.getElementById("username").innerText =
  "@" + (user.username || "нет");

document.getElementById("id").innerText =
  "ID: " + user.id;

document.getElementById("avatar").src =
  "https://i.pravatar.cc/150?u=" + user.id;

// 📦 Popup
function showInfo() {
  tg.showPopup({
    title: "Данные",
    message: `ID: ${user.id}\nUsername: @${user.username}`,
    buttons: [{ type: "ok" }]
  });
}

// 🎧 Музыка
function playMusic() {
  const music = document.getElementById("bgMusic");
  music.volume = 0.5;
  music.play();
}

// 🌌 Звезды
const canvas = document.getElementById("stars");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let stars = [];

for (let i = 0; i < 120; i++) {
  stars.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    speed: Math.random() * 2 + 0.5
  });
}

function drawStars() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  ctx.fillStyle = "white";

  stars.forEach(s => {
    ctx.fillRect(s.x, s.y, 2, 2);
    s.y += s.speed;

    if (s.y > canvas.height) {
      s.y = 0;
      s.x = Math.random() * canvas.width;
    }
  });

  requestAnimationFrame(drawStars);
}

drawStars();

// 👾 Кибер-монстр
const monster = document.createElement("div");

monster.style.position = "fixed";
monster.style.bottom = "40px";
monster.style.left = "50%";
monster.style.transform = "translateX(-50%)";
monster.style.width = "150px";
monster.style.height = "150px";
monster.style.borderRadius = "50%";
monster.style.background = "radial-gradient(circle, cyan, transparent)";
monster.style.boxShadow = "0 0 50px cyan";

document.body.appendChild(monster);

let angle = 0;

function animateMonster() {
  angle += 0.05;
  monster.style.transform =
    `translateX(-50%) translateY(${Math.sin(angle) * 20}px)`;

  requestAnimationFrame(animateMonster);
}

animateMonster();
</script>

</body>
</html>
