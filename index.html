<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Telegram Social Bot</title>
<style>
body {font-family: Arial, sans-serif; background:#121212; color:#f0f0f0; margin:0; padding:0;}
header {background:#1E90FF; padding:20px; text-align:center;}
main {padding:20px;}
button,input {font-size:16px;}
#chat-box {height:300px; border:1px solid #555; padding:10px; overflow-y:auto; margin-bottom:10px;}
#message-input {width:70%; padding:10px;}
#send-btn {padding:10px 20px;}
.profile {display:none; text-align:center;}
.profile img {width:120px; border-radius:50%;}
.user-list {margin-bottom:20px;}
.user-list button {margin:5px; padding:5px 10px; cursor:pointer;}
#login-btn {margin:20px auto; display:block;}
</style>
</head>
<body>

<header>
<h1>Telegram Social Bot</h1>
</header>

<main>
<div id="login-container">
    <!-- Telegram login widget -->
    <script async src="https://telegram.org/js/telegram-widget.js?7"
        data-telegram-login="@ZaloksBot"
        data-size="large"
        data-userpic="true"
        data-request-access="write"
        data-userpic="true"
        data-radius="10"
        data-auth-url="#"
        data-onauth="onTelegramAuth(user)"></script>
</div>

<div id="app" style="display:none;">
    <h2>Общий чат</h2>
    <div id="chat-box"></div>
    <input type="text" id="message-input" placeholder="Написать сообщение...">
    <button id="send-btn">Отправить</button>

    <h2>Пользователи</h2>
    <div class="user-list" id="user-list"></div>

    <div class="profile" id="profile">
        <img src="" alt="Аватар" id="profile-avatar">
        <h3 id="profile-name"></h3>
        <p id="profile-status"></p>
        <p id="profile-messages"></p>
        <button onclick="closeProfile()">Закрыть профиль</button>
    </div>
</div>
</main>

<script>
// Пользователи и сообщения
let users = [];
let messages = [];

let chatBox = document.getElementById('chat-box');
let input = document.getElementById('message-input');
let sendBtn = document.getElementById('send-btn');
let userList = document.getElementById('user-list');

// Функция авторизации через Telegram
function onTelegramAuth(user) {
    // user = {id, first_name, last_name, username, photo_url}
    console.log("Telegram user:", user);

    // Скрываем виджет, показываем приложение
    document.getElementById('login-container').style.display = 'none';
    document.getElementById('app').style.display = 'block';

    // Добавляем текущего пользователя в список
    let currentUser = {
        id: user.id,
        name: user.first_name + (user.last_name ? ' ' + user.last_name : ''),
        username: user.username,
        avatar: user.photo_url,
        status: 'активен',
        messages: 0
    };
    users.push(currentUser);

    // Отображаем список
    renderUsers();
    renderChat();

    // Сохраняем текущего пользователя
    window.currentUser = currentUser;
}

// Рендер списка пользователей
function renderUsers() {
    userList.innerHTML = '';
    users.forEach(user => {
        let btn = document.createElement('button');
        btn.textContent = user.name;
        btn.onclick = () => showProfile(user.id);
        userList.appendChild(btn);
    });
}

// Рендер чата
function renderChat() {
    chatBox.innerHTML = '';
    messages.forEach(msg => {
        const div = document.createElement('div');
        div.textContent = `${msg.user}: ${msg.text}`;
        chatBox.appendChild(div);
    });
    chatBox.scrollTop = chatBox.scrollHeight;
}

// Отправка сообщения
sendBtn.addEventListener('click', () => {
    const text = input.value.trim();
    if (!text) return;
    messages.push({user: window.currentUser.name, text});
    input.value = '';
    renderChat();

    // Увеличиваем счетчик сообщений
    window.currentUser.messages++;
    renderUsers();
});

// Профиль
function showProfile(id) {
    const user = users.find(u => u.id === id);
    if (!user) return;
    document.getElementById('profile-avatar').src = user.avatar || 'https://via.placeholder.com/120';
    document.getElementById('profile-name').textContent = user.name;
    document.getElementById('profile-status').textContent = `Статус: ${user.status}`;
    document.getElementById('profile-messages').textContent = `Сообщений: ${user.messages}`;
    document.getElementById('profile').style.display = 'block';
}
function closeProfile() {
    document.getElementById('profile').style.display = 'none';
}
</script>

</body>
</html>
